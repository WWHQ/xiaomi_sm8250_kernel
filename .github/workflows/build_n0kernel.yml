name: Build Kernel
run-name: Build Kernel with KernelSU Next + SUSFS for ${{ inputs.phone }}

on:
  workflow_dispatch:
    inputs:
      phone:
        description: '选择手机型号：'
        required: true
        default: 'umi'
        type: choice
        options:
          - umi      # 小米10
          - cmi      # 小米10 Pro
          - cas      # 小米10 Ultra（新增）
      susfs:
        description: '是否集成 SUSFS：'
        required: true
        default: 'SUSFS'
        type: choice
        options:
          - SUSFS
          - NoSUSFS
      version:
        description: '自定义版本名（如 perf-cas-xxx），留空则为 n0kernel'
        required: false
        type: string

jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"

    steps:
      - name: 1. 拉取编译链
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240125-release/Clang-19.0.0git-20240125.tar.gz
          mkdir -p clang
          tar -xzf Clang-19.0.0git-20240125.tar.gz -C clang

      - name: 2. 拉取源码与补丁
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          # 这里建议换成更适合 cas 的基础内核仓库（推荐支持 cas 的社区仓库）
          # 示例：可替换为支持 cas 的仓库，如 yspbwx2010/kernel_xiaomi_sm8250_mod 或 NikoKernelX_SM8250 等
          git clone https://github.com/CoolestEnoch/xiaomi-10-ultra-kernel --depth=1 android_kernel
          git clone https://github.com/CoolestEnoch/xiaomi-10-ultra-kernel.git src
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 --depth=1 susfs

      - name: 3. 添加 KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next

      - name: 4. 修补 KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          cp $GITHUB_WORKSPACE/kernel_workspace/src/patches/* .
          patch -p1 < new_defconfig.patch || true
          patch -p1 < non-kprobes.patch || true

      - name: 5. 修补 SUSFS
        run: |
          if [ "${{ inputs.susfs }}" = 'SUSFS' ]; then
            echo "集成 SUSFS"
            cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
            cp $GITHUB_WORKSPACE/kernel_workspace/susfs/kernel_patches/fs/* ./fs/ || true
            cp $GITHUB_WORKSPACE/kernel_workspace/susfs/kernel_patches/include/linux/* ./include/linux/ || true
            cp $GITHUB_WORKSPACE/kernel_workspace/susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch .
            patch -p1 < 50_add_susfs_in_kernel-4.19.patch || true
            patch -p1 < after_patch_fix.patch || true
          else
            echo "跳过 SUSFS 修补"
          fi

      - name: 6. 开始构建
        run: |
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
          clang --version

          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel

          # 自定义版本名
          if [ -n "${{ inputs.version }}" ]; then
            sed -i '$s|echo "\$res"|echo "-${{ inputs.version }}"|' ./scripts/setlocalversion
          fi

          # 根据手机型号选择 defconfig（cas 已新增）
          if [ "${{ inputs.phone }}" = 'umi' ]; then
            DEFCONFIG=vendor/umi_defconfig
          elif [ "${{ inputs.phone }}" = 'cmi' ]; then
            DEFCONFIG=vendor/cmi_defconfig
          elif [ "${{ inputs.phone }}" = 'cas' ]; then
            DEFCONFIG=vendor/cas_defconfig   # 如果仓库中是其他名称（如 vendor/cmi_defconfig 或 vendor/sm8250_defconfig），请自行修改
            echo "使用 cas defconfig: $DEFCONFIG"
          else
            echo "不支持的机型"
            exit 1
          fi

          echo "当前 defconfig: $DEFCONFIG"

          make -j$(nproc --all) CC=clang O=out ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-buildroot-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            $DEFCONFIG

          make -j8 CC=clang O=out ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: 7. 复制 boot 文件并准备 AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel/out/arch/arm64/boot
          ls -l
          strings Image | grep "Linux version" || true

          mkdir -p $GITHUB_WORKSPACE/kernel_workspace/src/Anykernel/kernels/miui/
          cp Image $GITHUB_WORKSPACE/kernel_workspace/src/Anykernel/kernels/miui/

      - name: 8. 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phone }}-SukiSU-Ultra-${{ inputs.susfs }}-AnyKernel3
          path: kernel_workspace/src/Anykernel/*
          retention-days: 7
